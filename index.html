
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Сундук</title>
<style>
  /* ============================================
     СУНДУК — Apple iOS Design System
  ============================================ */

  :root {
    /* Пастельная палитра */
    --pink:        #FFB6D5;
    --pink-soft:   #FFE4F1;
    --coral:       #FFC4B0;
    --lavender:    #C8B6FF;
    --lavender-soft: #EDE5FF;
    --purple:      #B197FC;
    --blue:        #A8C8FF;
    --blue-soft:   #DDE9FF;
    --mint:        #B6E5D8;
    --peach:       #FFD4C2;

    /* iOS системные */
    --bg:          #F7F4F9;
    --bg-elev:     #FFFFFF;
    --separator:   rgba(60, 60, 67, 0.08);

    /* Текст (iOS Label colors) */
    --label:       #1C1C1E;
    --label-2:     #3C3C43;
    --label-3:     #8E8E93;
    --label-4:     #C7C7CC;

    /* Акцент */
    --tint:        #A78BFA;
    --tint-grad:   linear-gradient(135deg, #C8B6FF 0%, #FFB6D5 100%);
    --success:     #34C759;

    /* iOS тени */
    --shadow-card: 0 1px 2px rgba(60,60,67,0.04), 0 4px 16px rgba(60,60,67,0.06);
    --shadow-soft: 0 8px 32px rgba(167, 139, 250, 0.18);
    --shadow-lift: 0 12px 40px rgba(200, 182, 255, 0.45);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--label);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-feature-settings: 'ss01', 'cv11';
    letter-spacing: -0.01em;
  }

  body {
    padding-bottom: 110px;
    background:
      radial-gradient(circle at 0% 0%, #FFE4F1 0%, transparent 35%),
      radial-gradient(circle at 100% 5%, #EDE5FF 0%, transparent 40%),
      var(--bg);
    background-attachment: fixed;
  }

  .container {
    max-width: 430px;
    margin: 0 auto;
    padding: 16px 20px 0;
  }

  /* ============ ШАПКА ============ */
  .nav-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0 4px;
    margin-bottom: 24px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .brand-mark {
    width: 32px;
    height: 32px;
    border-radius: 9px;
    background: var(--tint-grad);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 12px rgba(167, 139, 250, 0.35);
  }
  .brand-mark svg { width: 18px; height: 18px; color: white; }
  .brand-name {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.4px;
    color: var(--label);
  }
  .nav-actions {
    display: flex;
    gap: 8px;
  }
  .nav-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--bg-elev);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--shadow-card);
    cursor: pointer;
    transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .nav-btn:active { transform: scale(0.92); }
  .nav-btn svg { width: 18px; height: 18px; color: var(--label-2); }

  /* ============ ПРИВЕТСТВИЕ ============ */
  .greeting {
    margin-bottom: 24px;
  }
  .greeting-hello {
    font-size: 15px;
    color: var(--label-3);
    font-weight: 500;
    margin-bottom: 2px;
    letter-spacing: -0.2px;
  }
  .greeting-name {
    font-size: 28px;
    font-weight: 700;
    color: var(--label);
    letter-spacing: -0.7px;
  }

  /* ============ БАЛАНС ============ */
  .balance {
    background: linear-gradient(135deg, #FFD6E8 0%, #E0D4FF 45%, #C9DCFF 100%);
    border-radius: 28px;
    padding: 26px 24px;
    margin-bottom: 14px;
    box-shadow: var(--shadow-lift);
    position: relative;
    overflow: hidden;
  }
  .balance::before {
    content: '';
    position: absolute;
    top: -60%;
    right: -25%;
    width: 240px;
    height: 240px;
    background: radial-gradient(circle, rgba(255,255,255,0.5), transparent 70%);
    border-radius: 50%;
  }
  .balance-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    position: relative;
    z-index: 1;
  }
  .balance-label {
    font-size: 13px;
    color: var(--label-2);
    font-weight: 500;
    letter-spacing: -0.1px;
    opacity: 0.75;
  }
  .balance-eye {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .balance-eye svg { width: 14px; height: 14px; color: var(--label-2); }

  .balance-amount {
    font-size: 42px;
    font-weight: 700;
    letter-spacing: -1.5px;
    color: var(--label);
    line-height: 1;
    position: relative;
    z-index: 1;
  }
  .balance-amount .cur {
    font-size: 24px;
    opacity: 0.55;
    margin-left: 6px;
    font-weight: 600;
  }
  .balance-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    margin-top: 14px;
    padding: 6px 12px;
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(10px);
    color: #1A7F4E;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: -0.1px;
    position: relative;
    z-index: 1;
  }
  .balance-pill svg { width: 12px; height: 12px; }

  /* ============ КАРТОЧКИ 2x2 ============ */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 14px;
  }
  .card {
    background: var(--bg-elev);
    border-radius: 22px;
    padding: 18px;
    box-shadow: var(--shadow-card);
    cursor: pointer;
    transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .card:active { transform: scale(0.96); }

  .card-ic {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 14px;
  }
  .card-ic svg { width: 20px; height: 20px; color: white; stroke-width: 2.2; }
  .card-lbl {
    font-size: 13px;
    color: var(--label-3);
    font-weight: 500;
    margin-bottom: 4px;
    letter-spacing: -0.1px;
  }
  .card-val {
    font-size: 17px;
    font-weight: 700;
    color: var(--label);
    letter-spacing: -0.3px;
  }

  /* Градиенты иконок */
  .g-pink     { background: linear-gradient(135deg, #FFB6D5, #FF8FB8); }
  .g-lavender { background: linear-gradient(135deg, #C8B6FF, #A78BFA); }
  .g-blue     { background: linear-gradient(135deg, #A8C8FF, #7BA8F7); }
  .g-mint     { background: linear-gradient(135deg, #B6E5D8, #7DD3AE); }
  .g-coral    { background: linear-gradient(135deg, #FFC4B0, #FF9B7D); }
  .g-purple   { background: linear-gradient(135deg, #B197FC, #8A6FE8); }

  /* ============ БЛИЖАЙШЕЕ СПИСАНИЕ ============ */
  .upcoming {
    background: linear-gradient(135deg, #C8B6FF 0%, #FFB6D5 100%);
    border-radius: 24px;
    padding: 20px 22px;
    color: white;
    margin-bottom: 14px;
    box-shadow: 0 12px 32px rgba(200, 182, 255, 0.5);
    position: relative;
    overflow: hidden;
  }
  .upcoming::after {
    content: '';
    position: absolute;
    bottom: -50px;
    left: -30px;
    width: 160px;
    height: 160px;
    background: rgba(255,255,255,0.12);
    border-radius: 50%;
  }
  .upcoming-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    position: relative;
    z-index: 1;
  }
  .upcoming-ttl {
    font-size: 13px;
    font-weight: 600;
    opacity: 0.95;
    display: flex;
    align-items: center;
    gap: 6px;
    letter-spacing: -0.1px;
  }
  .upcoming-ttl svg { width: 14px; height: 14px; }
  .upcoming-tag {
    background: rgba(255,255,255,0.28);
    backdrop-filter: blur(10px);
    padding: 5px 11px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1px;
  }
  .upcoming-row {
    display: flex;
    align-items: center;
    gap: 14px;
    position: relative;
    z-index: 1;
  }
  .upcoming-logo {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 6px 16px rgba(0,0,0,0.12);
  }
  .upcoming-logo svg { width: 24px; height: 24px; color: #FF3B30; }
  .upcoming-info { flex: 1; }
  .upcoming-name {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.3px;
    margin-bottom: 2px;
  }
  .upcoming-when {
    font-size: 13px;
    opacity: 0.88;
    letter-spacing: -0.1px;
  }
  .upcoming-sum {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  /* ============ AI СОВЕТ ============ */
  .ai {
    background: var(--bg-elev);
    border-radius: 22px;
    padding: 16px;
    margin-bottom: 14px;
    box-shadow: var(--shadow-card);
    display: flex;
    gap: 14px;
    align-items: flex-start;
    border: 1px solid var(--lavender-soft);
  }
  .ai-ic {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    background: linear-gradient(135deg, #B197FC, #C8B6FF);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 6px 16px rgba(177, 151, 252, 0.35);
  }
  .ai-ic svg { width: 20px; height: 20px; color: white; stroke-width: 2.2; }
  .ai-body { flex: 1; padding-top: 1px; }
  .ai-lbl {
    font-size: 11px;
    color: var(--tint);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 5px;
  }
  .ai-txt {
    font-size: 14px;
    color: var(--label);
    line-height: 1.45;
    letter-spacing: -0.1px;
  }
  .ai-txt b { color: var(--tint); font-weight: 700; }

  /* ============ СЕКЦИЯ ============ */
  .section-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 28px 4px 14px;
  }
  .section-ttl {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--label);
  }
  .section-lnk {
    font-size: 15px;
    color: var(--tint);
    font-weight: 600;
    letter-spacing: -0.2px;
    cursor: pointer;
  }

  /* ============ ТРАТЫ ============ */
  .expenses {
    background: var(--bg-elev);
    border-radius: 22px;
    overflow: hidden;
    box-shadow: var(--shadow-card);
  }
  .exp {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .exp:active { background: rgba(60,60,67,0.04); }
  .exp + .exp { border-top: 0.5px solid var(--separator); }

  .exp-ic {
    width: 38px;
    height: 38px;
    border-radius: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .exp-ic svg { width: 19px; height: 19px; color: white; stroke-width: 2.2; }
  .exp-info { flex: 1; }
  .exp-name {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.2px;
    color: var(--label);
    margin-bottom: 2px;
  }
  .exp-cat {
    font-size: 12px;
    color: var(--label-3);
    letter-spacing: -0.1px;
  }
  .exp-sum {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--label);
  }

  /* ============ TAB BAR ============ */
  .tabbar {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    background: rgba(255, 255, 255, 0.78);
    backdrop-filter: blur(28px) saturate(180%);
    -webkit-backdrop-filter: blur(28px) saturate(180%);
    border-top: 0.5px solid rgba(60,60,67,0.12);
    padding: 10px 16px calc(24px + env(safe-area-inset-bottom));
    display: flex;
    justify-content: space-around;
    align-items: center;
    z-index: 100;
  }
  .tab {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 6px 8px;
    color: var(--label-4);
    cursor: pointer;
    transition: color 0.2s, transform 0.2s;
    flex: 1;
  }
  .tab:active { transform: scale(0.92); }
  .tab.active { color: var(--tint); }
  .tab svg { width: 24px; height: 24px; stroke-width: 1.8; }
  .tab.active svg { stroke-width: 2.2; }
  .tab-lbl {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1px;
  }

  .fab {
    width: 54px;
    height: 54px;
    border-radius: 50%;
    background: var(--tint-grad);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 10px 28px rgba(167, 139, 250, 0.55);
    margin-top: -26px;
    cursor: pointer;
    transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .fab:active { transform: scale(0.9); }
  .fab svg { width: 24px; height: 24px; color: white; stroke-width: 2.4; }

</style>
</head>
<body>

<div class="container">

  <!-- НАВ БАР -->
  <div class="nav-bar">
    <div class="brand">
      <div class="brand-mark">
        <!-- icon: sparkles -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3l1.9 5.2L19 10l-5.1 1.8L12 17l-1.9-5.2L5 10l5.1-1.8L12 3z"/>
          <path d="M19 14l.8 2.2L22 17l-2.2.8L19 20l-.8-2.2L16 17l2.2-.8L19 14z"/>
        </svg>
      </div>
      <div class="brand-name">Сундук</div>
    </div>
    <div class="nav-actions">
      <div class="nav-btn">
        <!-- search -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7"/>
          <path d="M21 21l-4.3-4.3"/>
        </svg>
      </div>
      <div class="nav-btn">
        <!-- bell -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 8a6 6 0 0112 0c0 7 3 9 3 9H3s3-2 3-9"/>
          <path d="M10.3 21a1.94 1.94 0 003.4 0"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- ПРИВЕТСТВИЕ -->
  <div class="greeting">
    <div class="greeting-hello">Добрый день</div>
    <div class="greeting-name">Анна! </div>
  </div>

  <!-- БАЛАНС -->
  <div class="balance">
    <div class="balance-top">
      <div class="balance-label">Баланс этого месяца</div>
      <div class="balance-eye">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </div>
    </div>
    <div class="balance-amount">42 580<span class="cur">₽</span></div>
    <div class="balance-pill">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M7 17l5-5 5 5M7 7l5 5 5-5"/>
      </svg>
      Экономия 3 200 ₽
    </div>
  </div>

  <!-- 4 КАРТОЧКИ -->
  <div class="grid">
    <div class="card">
      <div class="card-ic g-lavender">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="5" width="20" height="14" rx="3"/>
          <path d="M2 10h20"/>
        </svg>
      </div>
      <div class="card-lbl">Подписки</div>
      <div class="card-val">8 активных</div>
    </div>

    <div class="card">
      <div class="card-ic g-pink">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 3v18h18"/>
          <path d="M7 14l4-4 4 4 5-5"/>
        </svg>
      </div>
      <div class="card-lbl">Траты</div>
      <div class="card-val">28 400 ₽</div>
    </div>

    <div class="card">
      <div class="card-ic g-mint">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"/>
          <circle cx="12" cy="12" r="5"/>
          <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
        </svg>
      </div>
      <div class="card-lbl">Цели</div>
      <div class="card-val">2 из 3</div>
    </div>

    <div class="card">
      <div class="card-ic g-blue">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <path d="M13 2L4 14h7l-
